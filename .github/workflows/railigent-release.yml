name: Release Railigent Frontend to Harbor

on:
  push:
    branches:
      - master
    paths:
      - 'railigent/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./railigent
          push: true
          tags: |
            artifacts.railigent.host/hybrid/mission-control-frontend:latest
            artifacts.railigent.host/hybrid/mission-control-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
